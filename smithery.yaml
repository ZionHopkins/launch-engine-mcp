startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      projectDir:
        type: string
        title: "Project Directory"
        description: "Path to your project directory where pipeline-state.json and assets/ live. Defaults to current working directory."
  commandFunction: |
    (config) => ({
      command: 'npx',
      args: ['-y', 'asset-factory-mcp'],
      env: config.projectDir ? { ASSET_FACTORY_PROJECT_DIR: config.projectDir } : {}
    })
